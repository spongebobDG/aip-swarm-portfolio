; AIP Scout — ESP32-S3 micro-ROS client
;
; Talks to the central PC's micro-ROS Agent on udp4 @ 192.168.0.9:8888.
; Namespace (scout_1 / scout_2) is baked into NVS at first boot via the
; build flag SCOUT_NS; to reuse the same binary on both units, flash once,
; hold BOOT on power-up, and the firmware rewrites NVS from serial.
;
; WiFi credentials live in `secrets.ini` (gitignored) — copy
; `secrets.ini.example` and fill in the real SSID/PSK before building.
; That file contributes additional build_flags for WIFI_SSID and WIFI_PASS.

[platformio]
extra_configs = secrets.ini

[env:esp32-s3-scout]
platform = espressif32@6.6.0
board = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200
upload_speed = 921600

board_build.partitions = default_8MB.csv
board_build.flash_size = 8MB

; T11: Pin to a specific commit hash for supply-chain integrity.
; To update: git ls-remote https://github.com/micro-ROS/micro_ros_platformio.git humble
; Then replace the branch name with the resulting SHA (40-char hex).
; Example: https://github.com/micro-ROS/micro_ros_platformio.git#<40-char-commit-sha>
lib_deps =
    https://github.com/micro-ROS/micro_ros_platformio.git#humble

build_flags =
    -D AGENT_IP=\"192.168.0.9\"
    -D AGENT_PORT=8888
    ; H9: Change this value for each fleet to avoid cross-fleet interference.
    ; Matches docker/central/.env ROS_DOMAIN_ID. Range 0-232.
    -D ROS_DOMAIN_ID=42
    -D DEFAULT_SCOUT_NS=\"scout_1\"
