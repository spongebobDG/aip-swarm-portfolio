# Central PC services for the AIP fleet.
#
# Host assumed: Ubuntu 22.04 @ 192.168.0.9 with Docker + docker compose v2.
# All ROS2-facing services use host networking so DDS / UDP traffic is not NAT'd.
#
# Bring up:
#   cd ~/aip_swarm_ws/docker/central
#   docker compose up -d
#
# Logs:
#   docker compose logs -f fastdds-ds uros-agent dashboard

x-ros-env: &ros-env
  # H9: ROS_DOMAIN_ID is set in .env (copy from .env.example) so each
  # fleet gets a unique value without rebuilding images.
  ROS_DOMAIN_ID: "${ROS_DOMAIN_ID:-42}"
  ROS_DISCOVERY_SERVER: "192.168.0.10:11811"
  FASTRTPS_DEFAULT_PROFILES_FILE: "/opt/aip/fastdds_client_profile.xml"

services:
  # --------------------------------------------------------------------
  # FastDDS Discovery Server — unicast rendezvous for every DDS participant
  # on the fleet Wi-Fi. Uses the ROS2 humble fastrtps package so the image
  # is guaranteed to match the wire format used by the rest of the stack.
  # --------------------------------------------------------------------
  fastdds-ds:
    # 호스트에서 systemd user 서비스(~/.config/systemd/user/fastdds-ds.service)로 관리.
    # docker compose up -d 시 기본 시작 안 됨. 직접 구동 시: docker compose --profile docker-ds up -d fastdds-ds
    profiles: [docker-ds]
    image: ros:humble-ros-base@sha256:ec4ea4a624a8ea2aa3e304695731570cd47e4424980d7f00da4d172dc08a8625
    container_name: aip_fastdds_ds
    restart: unless-stopped
    network_mode: host
    # H6: drop all Linux capabilities; port 11811 > 1024 so no NET_BIND_SERVICE needed.
    cap_drop: [ALL]
    command: >
      bash -c "
        exec /opt/ros/humble/bin/fast-discovery-server -i 0 -l 192.168.0.10 -p 11811
      "

  # --------------------------------------------------------------------
  # micro-ROS Agent — UDP4 endpoint for ESP32-S3 scouts.
  # --------------------------------------------------------------------
  uros-agent:
    image: microros/micro-ros-agent:humble@sha256:da13a79e5cfd519ade958e8b3fe52f7066c7a2dba41ab379ebad1f9cb1a56547
    container_name: aip_uros_agent
    restart: unless-stopped
    network_mode: host
    # H6: pre-built binary; run as unprivileged user, drop all capabilities.
    user: "65534:65534"
    cap_drop: [ALL]
    # T10: Micro XRCE-DDS Agent does not expose a bind-IP flag in v2.x.
    # Source-IP filtering is handled at the UFW layer (see docs/SETUP_UBUNTU.md).
    command: udp4 --port 8888 -v6

  # --------------------------------------------------------------------
  # Fleet Dashboard — FastAPI + WebSocket 기반 웹 관제 UI (http://localhost:8080)
  #
  # aip_fleet_msgs 등 커스텀 ROS2 패키지에 의존하므로 공개 이미지만으로는
  # 실행 불가. 호스트의 colcon install/ 디렉터리를 볼륨 마운트하여 해결.
  # 코드 수정 후 colcon build만 하면 컨테이너 재빌드 없이 즉시 반영됨.
  # --------------------------------------------------------------------
  # dashboard 서비스는 호스트 systemd user 서비스(aip-central.service)로 관리.
  # central_real_combined.py = DashboardNode + SupervisorNode + WatchdogNode 통합 실행.
  # docker compose up -d 시 기본 시작 안 됨.
  # 직접 구동 시: docker compose --profile docker-dashboard up -d dashboard
  dashboard:
    profiles: [docker-dashboard]
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    image: aip_dashboard_image
    container_name: aip_dashboard
    restart: unless-stopped
    network_mode: host
    cap_drop: [ALL]
    environment:
      <<: *ros-env
      RMW_IMPLEMENTATION: rmw_fastrtps_cpp
      AIP_VISION_STREAM_URLS: "${AIP_VISION_STREAM_URLS:-}"
      AIP_THERMAL_STREAM_URLS: "${AIP_THERMAL_STREAM_URLS:-}"
      AIP_VISION_POLL_MS: "${AIP_VISION_POLL_MS:-0}"
      AIP_RGB_POLL_MS: "${AIP_RGB_POLL_MS:-0}"
      AIP_THERMAL_POLL_MS: "${AIP_THERMAL_POLL_MS:-0}"
    volumes:
      - ../../install:/opt/aip/install:ro
      - ../../build:/opt/aip/build:ro
      - ../../build:/home/kde/aip_swarm_ws/build:ro
      - /home/kde/aip_swarm_ws/src:/home/kde/aip_swarm_ws/src:ro
      - ../../config/fastdds_client_profile.xml:/opt/aip/fastdds_client_profile.xml:ro
    command: >
      bash -lc "
        source /opt/ros/humble/setup.bash &&
        source /opt/aip/install/setup.bash &&
        ros2 run aip_fleet_dashboard dashboard_server
      "

  # --------------------------------------------------------------------
  # Foxglove Bridge — WebSocket gateway for Foxglove Studio clients.
  #
  # ghcr.io/foxglove/ros-foxglove-bridge:humble 이미지가 공개 배포
  # 중단됨. foxglove_bridge는 apt(ros-humble-foxglove-bridge)로 호스트에
  # 설치한 뒤 central.launch.py 에서 ROS2 노드로 구동한다.
  #
  # 설치: bash ~/aip_swarm_ws/scripts/setup_ubuntu.sh  (이미 포함)
  # 실행: ros2 launch aip_fleet_bringup central.launch.py
  # --------------------------------------------------------------------
  # (foxglove-bridge 서비스 제거 — host ROS2 노드로 대체)

  # --------------------------------------------------------------------
  # Continuous rosbag2 recording. Rolls every 1 GiB; rename / prune via
  # cron outside the container if you need long retention.
  # --------------------------------------------------------------------
  rosbag-recorder:
    image: ros:humble-ros-base@sha256:ec4ea4a624a8ea2aa3e304695731570cd47e4424980d7f00da4d172dc08a8625
    container_name: aip_rosbag_recorder
    restart: unless-stopped
    network_mode: host
    # H6 TODO: this service runs apt-get install at startup (needs root).
    # Move ros-humble-rosbag2-storage-mcap into Dockerfile.central or a
    # dedicated pre-built image to allow non-root + cap_drop here.
    cap_drop: [ALL]
    cap_add: [SETUID, SETGID]  # apt-get drops privs internally
    environment: *ros-env
    volumes:
      - ../../config/fastdds_client_profile.xml:/opt/aip/fastdds_client_profile.xml:ro
      - aip_rosbags:/rosbags
    working_dir: /rosbags
    entrypoint: ["/bin/bash", "-lc"]
    command:
      - |
        source /opt/ros/humble/setup.bash
        apt-get update && apt-get install -y --no-install-recommends ros-humble-rosbag2-storage-mcap >/dev/null
        STAMP=$$(date +%Y%m%d_%H%M%S)
        exec ros2 bag record -a \
          --compression-mode file \
          --compression-format zstd \
          --max-bag-size 1073741824 \
          -o aip_fleet_$$STAMP

  # --------------------------------------------------------------------
  # Optional: InfluxDB for long-horizon telemetry. Not wired to anything
  # yet — see docs/ANALYSIS.md §"Telemetry".
  #
  # Credentials come from `.env` in this directory (gitignored; see
  # `.env.example`). Compose will fail to start if any ${VAR} is unset,
  # which is intentional so production never runs with placeholder values.
  # --------------------------------------------------------------------
  # InfluxDB: 볼륨 퍼미션 문제 해결 전까지 수동 실행. docker compose --profile telemetry up -d influxdb
  influxdb:
    profiles: [telemetry]
    image: influxdb:2.7@sha256:3b4f54f583cd5d6d31f4642cad69a69e3d50b79531dd972801a1dc524754d2fc
    container_name: aip_influxdb
    restart: unless-stopped
    # H6: official influxdb image already drops privileges internally.
    cap_drop: [ALL]
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUXDB_USERNAME:?INFLUXDB_USERNAME is required — see .env.example}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_PASSWORD:?INFLUXDB_PASSWORD is required — see .env.example}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUXDB_ORG:?INFLUXDB_ORG is required — see .env.example}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUXDB_BUCKET:?INFLUXDB_BUCKET is required — see .env.example}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_ADMIN_TOKEN:?INFLUXDB_ADMIN_TOKEN is required — see .env.example}
    volumes:
      - aip_influx_data:/var/lib/influxdb2
      - aip_influx_cfg:/etc/influxdb2

volumes:
  aip_rosbags:
  aip_influx_data:
  aip_influx_cfg:
