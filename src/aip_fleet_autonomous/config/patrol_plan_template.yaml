# AIP Fleet 순찰 경로 계획 파일 — 템플릿
#
# 사용법:
#   ros2 launch aip_fleet_autonomous fleet_autonomous.launch.py \
#       with_patrol:=true patrol_plan:=/path/to/this_file.yaml
#
# 형식: vehicle_id → [[x, y, yaw_deg], ...]
#   x, y   : map 프레임 좌표 (m)
#   yaw_deg: 도착 방향 (도). 0=동쪽, 90=북쪽, 180=서쪽, -90=남쪽
#
# 이 파일을 직접 편집하거나 patrol_planner_node 로 생성하세요:
#   ros2 run aip_fleet_autonomous patrol_planner_node --ros-args \
#       -p output_path:=/path/to/output.yaml \
#       -p active_vehicle:=peer_1
#
# ── 방법 1: 웨이포인트 직접 작성 ─────────────────────────────────────────────
# 각 차량이 순서대로 방문할 좌표를 직접 입력합니다.
# patrol_planner_node를 사용하면 RViz에서 클릭으로 추가할 수 있습니다.

# ── 방법 2: 커버리지 영역 지정 후 자동 생성 ──────────────────────────────────
# patrol_planner_node를 사용해 폴리곤을 정의하고 경로를 자동 생성합니다.
#
# 순서:
#   1. ros2 run aip_fleet_autonomous patrol_planner_node --ros-args \
#          -p active_vehicle:=peer_2 -p output_path:=./patrol_plan.yaml
#   2. RViz에서 "mode:coverage" 명령 후 "Publish Point"로 꼭짓점 클릭
#   3. "generate_coverage 2.0" 명령 (행 간격 2.0m)
#   4. "save" 명령으로 저장

# ── 기본값: 3-zone 구석 커버리지 경로 (fleet_world.sdf 기준) ────────────────
#
# 구역 분할 (겹침 없음):
#   peer_1 : 북부 전담 — doorway(y=4.0) 통과, 북동/북서 구석(x=±4.5,y=7.5) 포함
#   peer_2 : 동남 전담 — 동쪽 벽(x=4.5) + 남부 심층(y=-7.5)
#   peer_3 : 서남 전담 — 서쪽 벽(x=-4.5) + 남부 심층(y=-7.5)
#
# 장애물 이격 기준: inflation_radius=0.35m, 전 좌표 안전 검증 완료.
# 실제 환경에서는 아래 좌표를 실내 맵에 맞게 수정하세요.

peer_1:
  # 북부 전담 + 북동/북서 구석 확장
  - [ 0.0,  1.5,  90.0]   # 중앙 시작
  - [ 2.5,  3.5,  90.0]   # doorway 직전
  - [ 3.5,  4.6,  45.0]   # doorway 통과 동측
  - [ 4.5,  5.5,  90.0]   # 북동 하단 (shelf_center 동쪽 끝에서 1.8m)
  - [ 4.5,  7.5, 135.0]   # 북동 구석 (shelf_N_east 서쪽에서 1.8m)
  - [ 2.0,  7.5, 135.0]   # heat_source_fire 인근
  - [-1.5,  7.5, 180.0]   # 북부 중앙 횡단
  - [-4.5,  7.5,-135.0]   # 북서 구석 (shelf_N_west 동쪽에서 1.8m)
  - [-4.5,  5.5,-135.0]   # 북서 하단
  - [ 2.5,  4.5, -90.0]   # doorway 복귀
  - [ 0.0,  1.5, 180.0]   # 귀환

peer_2:
  # 동남 전담 — 동쪽 벽(x=4.5) + 남부 심층(y=-7.5)
  - [ 4.5,  0.5,   0.0]   # 동쪽 상단 (pillar_2/4 사이)
  - [ 4.5, -2.0, -90.0]   # 동쪽 중앙 (pillar_4에서 0.73m)
  - [ 4.5, -5.5, -90.0]   # 동쪽 남부 (col_loading_E 남쪽 1.3m)
  - [ 3.0, -7.5, 180.0]   # 남동 심층 구석
  - [ 1.5, -7.5, 180.0]   # 남부 동측 심층 (crate 이북 0.6m)
  - [ 0.5, -5.0, 180.0]   # 남부 중앙 복귀
  - [ 0.5, -2.0,  90.0]   # 북행 복귀
  - [ 2.0,  0.5,  90.0]   # 동측 복귀

peer_3:
  # 서남 전담 — 서쪽 벽(x=-4.5) + 남부 심층(y=-7.5) — peer_2 대칭
  - [-4.5,  0.5, 180.0]   # 서쪽 상단 (pillar_1/3 사이)
  - [-4.5, -2.0, -90.0]   # 서쪽 중앙 (pillar_3에서 0.73m)
  - [-4.5, -5.5, -90.0]   # 서쪽 남부 (col_loading_W 남쪽 1.3m)
  - [-3.0, -7.5,   0.0]   # 남서 심층 구석
  - [-1.5, -7.5,   0.0]   # 남부 서측 심층 (crate 이북 0.6m)
  - [-0.5, -5.0,   0.0]   # 남부 중앙 복귀
  - [-0.5, -2.0,  90.0]   # 북행 복귀
  - [-2.0,  0.5, 180.0]   # 서측 복귀
