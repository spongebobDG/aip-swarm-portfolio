# patrol_waypoints_example.yaml — 순찰 웨이포인트 예시 (맵 프레임, yaw 단위: 도)
#
# 웨이포인트는 flat list [x, y, yaw_deg, x, y, yaw_deg, …] 형식.
# patrol_node 파라미터 'waypoints' 에 직접 전달하거나,
# fleet_autonomous.launch.py 의 _PATROL_WAYPOINTS 딕셔너리에 등록.
#
# 시뮬 맵 기준 예시 (fleet_world, 8×8m 공간 가정):
#   peer_2: 좌측 영역 순찰 루프 (반시계)
#   peer_3: 우측 영역 순찰 루프 (시계)

peer_2_waypoints: [
   2.0,  1.5,   0.0,   #  1. 우측 상단
   2.0, -1.5,  -90.0,  #  2. 우측 하단
  -0.5, -1.5, -180.0,  #  3. 중앙 하단
  -0.5,  1.5,   90.0,  #  4. 중앙 상단
]

peer_3_waypoints: [
   2.0, -2.0,    0.0,  #  1. 우측 하단
   2.0, -4.5,  -90.0,  #  2. 우측 하단 심부
  -0.5, -4.5, -180.0,  #  3. 중앙 하단 심부
  -0.5, -2.0,   90.0,  #  4. 중앙 하단
]
