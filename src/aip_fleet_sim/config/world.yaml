# Simulated world definition. All units in metres. World is axis-aligned in
# the `map` frame. Obstacles are axis-aligned rectangles (x_min, y_min,
# x_max, y_max) — simple enough to ray-cast analytically.

world:
  size_x: 20.0
  size_y: 20.0
  origin_x: -10.0
  origin_y: -10.0
  resolution: 0.05           # 5 cm/cell for the OccupancyGrid publish
  obstacles:
    # Outer safety boundary.
    - [-9.0, -9.0,  9.0, -8.8]  # south wall
    - [-9.0,  8.8,  9.0,  9.0]  # north wall
    - [-9.0, -9.0, -8.8,  9.0]  # west wall
    - [ 8.8, -9.0,  9.0,  9.0]  # east wall

    # Warehouse rack rows with cross-aisle gaps.
    - [-7.2, -6.8, -5.9, -2.6]
    - [-7.2, -1.6, -5.9,  2.8]
    - [-7.2,  3.8, -5.9,  7.0]
    - [ 5.9, -7.0,  7.2, -3.0]
    - [ 5.9, -2.0,  7.2,  2.2]
    - [ 5.9,  3.2,  7.2,  7.0]

    # Inspection rooms and equipment islands.
    - [-3.4,  3.0, -1.8,  6.6]
    - [ 1.6,  2.8,  3.4,  6.6]
    - [-0.35, 1.4,  0.35, 3.4]
    - [-2.6, -6.8, -0.9, -5.2]
    - [ 0.8, -6.8,  2.6, -5.2]
    - [-1.2, -2.2,  1.2, -1.2]
    - [ 2.4, -2.6,  4.3, -1.2]

    # Charging / staging areas.
    - [-1.5,  7.1,  1.5,  8.2]
    - [-8.1, -8.1, -5.4, -7.3]
    - [ 5.4, -8.1,  8.1, -7.3]
