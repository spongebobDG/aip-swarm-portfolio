# Nav2 — 메인 AGV (aip1) 실차용.
#
# 네임스페이스: navigation_launch.py 가 namespace=aip1 으로 RewriteYaml(root_key='aip1')
# 적용 → 이 파일의 bare 키(bt_navigator:, controller_server: …)가 /aip1/* 노드와 매칭.
# PushRosNamespace('aip1') + SetRemap('/tf','/tf') 는 launch 에서 처리.
#
# 위치추정: localization:=slam(slam_toolbox) 또는 :=amcl(map_server+amcl) 모두 /map 과
# map→odom TF 를 제공하므로 본 Nav2 설정은 두 모드에서 동일하게 동작한다.
#
# 하드웨어: FIT0186 DC모터 2개(diff-drive), 바퀴 지름 120mm, 간격 290mm
#   footprint: [[0.15,0.115],[0.15,-0.115],[-0.15,-0.115],[-0.15,0.115]] (300×230mm)
#   최소 선회 반경: 0.145m (휠베이스/2)
#   권장 속도: 0.2~0.5 m/s (순찰 미션 스펙), 최대 0.4 m/s (실차 검증 후 상향)
#
# SLAM: slam_toolbox(async) 가 /aip1/scan 구독 → /map 발행 + map→aip1/odom TF.
# AMCL/map_server 없음 — slam_toolbox 가 localization 겸임.
#
# ⚠️ use_sim_time: false 고정 (실차에서 true 는 절대 금지 — 로봇 미동작).

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: aip1/base_footprint  # fleet_main RSP: "base_footprint" (no namespace prefix)
    odom_topic: /aip1/odom
    bt_loop_duration: 10
    default_server_timeout: 20
    bond_timeout: 0.0   # lifecycle bond 비활성 — 실차 DDS 환경에서 false positive 방지

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 5.0  # RPi4B CPU 여유 확보: 10Hz→5Hz
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugins: ['progress_checker']
    goal_checker_plugins: ['goal_checker']
    controller_plugins: ['FollowPath']

    progress_checker:
      plugin: 'nav2_controller::SimpleProgressChecker'
      required_movement_radius: 0.10
      movement_time_allowance: 15.0

    goal_checker:
      plugin: 'nav2_controller::SimpleGoalChecker'
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25
      stateful: True

    FollowPath:
      plugin: 'nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController'
      desired_linear_vel: 0.30
      lookahead_dist: 0.6
      min_lookahead_dist: 0.3
      max_lookahead_dist: 0.9
      lookahead_time: 1.5
      rotate_to_heading_angular_vel: 0.8
      transform_tolerance: 0.3
      use_velocity_scaled_lookahead_dist: true
      min_approach_linear_velocity: 0.20   # 중량차 정지마찰 임계: ≥0.2m/s 아니면 바퀴 안 움직임(실측). 목표 근접 정지 방지
      approach_velocity_scaling_dist: 0.6
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 1.0
      use_regulated_linear_velocity_scaling: true
      use_cost_regulated_linear_velocity_scaling: false
      regulated_linear_scaling_min_radius: 0.9
      regulated_linear_scaling_min_speed: 0.20   # 곡선/장애물 근처 감속 하한도 정지마찰 임계(0.2) 이상 유지
      use_rotate_to_heading: true
      rotate_to_heading_min_angle: 0.785
      max_angular_accel: 1.0
      allow_reversing: false

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: aip1/odom     # serial_bridge TF: "aip1/odom"→"aip1/base_footprint"
      robot_base_frame: aip1/base_footprint
      update_frequency: 3.0  # RPi4B 절감: 5→3Hz
      publish_frequency: 2.0
      transform_tolerance: 0.5
      rolling_window: true
      width: 4
      height: 4
      resolution: 0.05
      footprint: "[[0.15, 0.115], [0.15, -0.115], [-0.15, -0.115], [-0.15, 0.115]]"
      footprint_padding: 0.05
      plugins: ['obstacle_layer', 'inflation_layer']
      obstacle_layer:
        plugin: 'nav2_costmap_2d::ObstacleLayer'
        enabled: True
        observation_sources: scan keepout_cloud
        scan:
          topic: /aip1/scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: 'LaserScan'
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
          inf_is_valid: true
        # 대시보드 금지구역(위험구역) — keepout_zone_node가 /fleet/keepout_cloud(map프레임)로 발행.
        # clearing:False = 마킹만(레이캐스트 소거 없음 → RPi4B 저부하). 해제 시 ClearEntireCostmap.
        keepout_cloud:
          topic: /fleet/keepout_cloud
          data_type: 'PointCloud2'
          max_obstacle_height: 2.0
          obstacle_max_range: 5.0   # 로컬 4x4 윈도우 모서리(~2.83m) 포함
          clearing: False
          marking: True
      inflation_layer:
        plugin: 'nav2_costmap_2d::InflationLayer'
        cost_scaling_factor: 3.0
        inflation_radius: 0.30
      always_send_full_costmap: True

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: map
      robot_base_frame: aip1/base_footprint
      update_frequency: 0.5  # RPi4B 절감: 1→0.5Hz (글로벌코스트맵 실내에서 충분)
      publish_frequency: 0.5
      transform_tolerance: 0.5
      resolution: 0.05
      footprint: "[[0.15, 0.115], [0.15, -0.115], [-0.15, -0.115], [-0.15, 0.115]]"
      footprint_padding: 0.05
      track_unknown_space: true
      plugins: ['static_layer', 'obstacle_layer', 'inflation_layer']
      static_layer:
        plugin: 'nav2_costmap_2d::StaticLayer'
        map_topic: /map          # slam_toolbox 는 절대경로 /map 발행; 네임스페이스 무관
        map_subscribe_transient_local: True
        subscribe_to_updates: True
        enabled: True
      obstacle_layer:
        plugin: 'nav2_costmap_2d::ObstacleLayer'
        enabled: True
        observation_sources: scan keepout_cloud
        scan:
          topic: /aip1/scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: 'LaserScan'
          raytrace_max_range: 7.0
          raytrace_min_range: 0.0
          obstacle_max_range: 6.5
          obstacle_min_range: 0.0
          inf_is_valid: true
        # 대시보드 금지구역(위험구역) — keepout_zone_node가 /fleet/keepout_cloud(map프레임)로 발행.
        # clearing:False = 마킹만(소거 없음). 전역 코스트맵이라 전 범위 마킹.
        keepout_cloud:
          topic: /fleet/keepout_cloud
          data_type: 'PointCloud2'
          max_obstacle_height: 2.0
          obstacle_max_range: 100.0
          clearing: False
          marking: True
      inflation_layer:
        plugin: 'nav2_costmap_2d::InflationLayer'
        cost_scaling_factor: 3.0
        inflation_radius: 0.30
      always_send_full_costmap: True

planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 1.0
    planner_plugins: ['GridBased']
    GridBased:
      # NavFn: holonomic 경로 (diff-drive 에 실용적, SmacHybrid 보다 가볍고 안정적)
      # 실내 순찰 환경에서 충분. 좁은 통로 정밀 주행이 필요하면 SmacHybrid 로 교체.
      plugin: 'nav2_navfn_planner/NavfnPlanner'
      tolerance: 0.5
      use_astar: false
      allow_unknown: true

smoother_server:
  ros__parameters:
    use_sim_time: false
    smoother_plugins: ['simple_smoother']
    simple_smoother:
      plugin: 'nav2_smoother::SimpleSmoother'
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True

behavior_server:
  ros__parameters:
    use_sim_time: false
    local_costmap_topic: local_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_costmap_topic: global_costmap/costmap_raw
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 5.0   # RPi4B 절감: 10→5Hz (복구 동작 실행 빈도, 주행 중엔 비활성)
    # 후방 라이다 마스킹 사각(arm base) → backup(후진복구) 제거: 안 보이는 후방으로
    #   후진하다 충돌하는 것을 원천 차단. spin/drive_on_heading/wait 만 사용.
    behavior_plugins: ['spin', 'drive_on_heading', 'wait']
    spin: {plugin: 'nav2_behaviors/Spin'}
    # backup 비활성(후방 사각 안전) — 필요 시 사각 보강 후 재추가
    # backup: {plugin: 'nav2_behaviors/BackUp'}
    drive_on_heading: {plugin: 'nav2_behaviors/DriveOnHeading'}
    wait: {plugin: 'nav2_behaviors/Wait'}
    local_frame: odom           # serial_bridge TF: "odom" (no prefix)
    global_frame: map
    robot_base_frame: aip1/base_footprint
    transform_tolerance: 0.5
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.50   # 중량차 회전 정지마찰: ≥0.4~0.5rad/s 실측. 복구 spin 하한 상향
    rotational_acc_lim: 3.2

waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 10   # RPi4B 절감: 20→10Hz
    stop_on_failure: false
    waypoint_task_executor_plugin: 'wait_at_waypoint'
    wait_at_waypoint:
      plugin: 'nav2_waypoint_follower::WaitAtWaypoint'
      enabled: True
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    # twist_mux 가 스무딩/우선순위를 담당하므로 본 노드는 cmd_vel→autonomy_cmd_vel
    # remap 으로 입력이 끊겨 no-op. 실차 주행 테스트 후 필요 시 활성화.
    use_sim_time: false
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: 'OPEN_LOOP'
    max_velocity: [0.40, 0.0, 1.0]
    min_velocity: [0.0, 0.0, -1.0]   # 후진(vx<0) 금지 — 후방 사각 충돌 차단(회전은 허용)
    max_accel: [2.5, 0.0, 3.2]
    max_decel: [-2.5, 0.0, -3.2]
    odom_topic: '/aip1/odom'
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0
