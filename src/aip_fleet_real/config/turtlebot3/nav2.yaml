# Nav2 — TurtleBot3 Burger (aip2) 실차.
#
# nav2_bringup navigation_launch.py 가 namespace=aip2, use_namespace=true 로
# RewriteYaml(root_key='aip2') 을 적용하므로 노드 키는 bare(네임스페이스 미포함)로 둔다.
# frame 값(aip2/base_link 등)은 rewrite 대상이 아니므로 명시적으로 적는다.
#
# AMCL/map_server 없음 — slam_toolbox(mapping)가 map 및 map→odom TF 제공.
# 시뮬 원본(aip_swarm_ws src/aip_fleet_autonomous/params/nav2_full.yaml)을
# Burger 풋프린트(robot_radius 0.105)·속도(≤0.20 m/s)로 조정. use_sim_time: false.

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: aip2/base_link
    odom_topic: /aip2/odom
    bt_loop_duration: 10
    default_server_timeout: 20
    # plugin_lib_names 미지정 시 Humble 기본 BT 노드 세트 자동 로드.

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 5.0   # RPi4B 절감: 10→5Hz
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugins: ['progress_checker']
    goal_checker_plugins: ['goal_checker']
    controller_plugins: ['FollowPath']

    progress_checker:
      plugin: 'nav2_controller::SimpleProgressChecker'
      required_movement_radius: 0.10
      movement_time_allowance: 15.0

    goal_checker:
      plugin: 'nav2_controller::SimpleGoalChecker'
      xy_goal_tolerance: 0.20
      yaw_goal_tolerance: 0.25
      stateful: True

    FollowPath:
      plugin: 'nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController'
      desired_linear_vel: 0.30
      lookahead_dist: 0.4
      min_lookahead_dist: 0.2
      max_lookahead_dist: 0.6
      lookahead_time: 1.5
      rotate_to_heading_angular_vel: 0.8
      transform_tolerance: 0.3
      use_velocity_scaled_lookahead_dist: true
      min_approach_linear_velocity: 0.05
      approach_velocity_scaling_dist: 0.5
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 1.0
      use_regulated_linear_velocity_scaling: true
      use_cost_regulated_linear_velocity_scaling: false
      regulated_linear_scaling_min_radius: 0.9
      regulated_linear_scaling_min_speed: 0.05
      use_rotate_to_heading: true
      rotate_to_heading_min_angle: 0.785
      max_angular_accel: 3.2
      allow_reversing: false

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: aip2/odom
      robot_base_frame: aip2/base_link
      update_frequency: 3.0   # RPi4B 절감: 5→3Hz
      publish_frequency: 2.0
      transform_tolerance: 0.5
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      robot_radius: 0.105        # Burger footprint 외접원
      plugins: ['obstacle_layer', 'inflation_layer']
      obstacle_layer:
        plugin: 'nav2_costmap_2d::ObstacleLayer'
        enabled: True
        observation_sources: scan keepout_cloud
        scan:
          topic: /aip2/scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: 'LaserScan'
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
          inf_is_valid: true
        # 대시보드 금지구역(위험구역) — keepout_zone_node가 /fleet/keepout_cloud(map프레임)로 발행.
        # clearing:False = 마킹만(저부하). 해제 시 ClearEntireCostmap.
        keepout_cloud:
          topic: /fleet/keepout_cloud
          data_type: 'PointCloud2'
          max_obstacle_height: 2.0
          obstacle_max_range: 5.0
          clearing: False
          marking: True
      inflation_layer:
        plugin: 'nav2_costmap_2d::InflationLayer'
        cost_scaling_factor: 3.0
        inflation_radius: 0.30
      always_send_full_costmap: True

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: map
      robot_base_frame: aip2/base_link
      update_frequency: 0.5   # RPi4B 절감: 1→0.5Hz (글로벌맵 변화 느림)
      publish_frequency: 0.5
      transform_tolerance: 0.5
      robot_radius: 0.105
      resolution: 0.05
      track_unknown_space: true
      plugins: ['static_layer', 'obstacle_layer', 'inflation_layer']
      static_layer:
        plugin: 'nav2_costmap_2d::StaticLayer'
        map_topic: /map          # slam_toolbox 는 절대경로 /map 발행; 네임스페이스 무관
        map_subscribe_transient_local: True
        subscribe_to_updates: True
        enabled: True
      obstacle_layer:
        plugin: 'nav2_costmap_2d::ObstacleLayer'
        enabled: True
        observation_sources: scan keepout_cloud
        scan:
          topic: /aip2/scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: 'LaserScan'
          raytrace_max_range: 7.0
          raytrace_min_range: 0.0
          obstacle_max_range: 6.5
          obstacle_min_range: 0.0
          inf_is_valid: true
        # 대시보드 금지구역(위험구역) — keepout_zone_node가 /fleet/keepout_cloud(map프레임)로 발행.
        # clearing:False = 마킹만. 전역이라 전 범위 마킹.
        keepout_cloud:
          topic: /fleet/keepout_cloud
          data_type: 'PointCloud2'
          max_obstacle_height: 2.0
          obstacle_max_range: 100.0
          clearing: False
          marking: True
      inflation_layer:
        plugin: 'nav2_costmap_2d::InflationLayer'
        cost_scaling_factor: 3.0
        inflation_radius: 0.30
      always_send_full_costmap: True

planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 1.0
    planner_plugins: ['GridBased']
    GridBased:
      # Burger 는 제자리 회전 가능 → NavFn(holonomic 경로)이 단순/견고.
      plugin: 'nav2_navfn_planner/NavfnPlanner'
      tolerance: 0.5
      use_astar: false
      allow_unknown: true

smoother_server:
  ros__parameters:
    use_sim_time: false
    smoother_plugins: ['simple_smoother']
    simple_smoother:
      plugin: 'nav2_smoother::SimpleSmoother'
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True

behavior_server:
  ros__parameters:
    use_sim_time: false
    local_costmap_topic: local_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_costmap_topic: global_costmap/costmap_raw
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 5.0   # RPi4B 절감: 10→5Hz
    behavior_plugins: ['spin', 'backup', 'drive_on_heading', 'wait']
    spin: {plugin: 'nav2_behaviors/Spin'}
    backup: {plugin: 'nav2_behaviors/BackUp'}
    drive_on_heading: {plugin: 'nav2_behaviors/DriveOnHeading'}
    wait: {plugin: 'nav2_behaviors/Wait'}
    local_frame: aip2/odom
    global_frame: map
    robot_base_frame: aip2/base_link
    transform_tolerance: 0.5
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2

waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 10   # RPi4B 절감: 20→10Hz
    stop_on_failure: false
    waypoint_task_executor_plugin: 'wait_at_waypoint'
    wait_at_waypoint:
      plugin: 'nav2_waypoint_follower::WaitAtWaypoint'
      enabled: True
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    # twist_mux 가 스무딩/우선순위를 담당하므로 본 노드는 cmd_vel→autonomy_cmd_vel
    # remap 으로 입력이 끊겨 no-op. 참고용 기본값만 유지.
    use_sim_time: false
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: 'OPEN_LOOP'
    max_velocity: [0.20, 0.0, 2.5]
    min_velocity: [-0.10, 0.0, -2.5]
    max_accel: [2.5, 0.0, 3.2]
    max_decel: [-2.5, 0.0, -3.2]
    odom_topic: '/aip2/odom'
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0
