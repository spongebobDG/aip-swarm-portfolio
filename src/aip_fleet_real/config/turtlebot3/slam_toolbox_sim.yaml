# slam_toolbox (mapping) — Gazebo Classic TB3 Burger 시뮬 (aip2).
# 실차 slam_toolbox.yaml 의 시뮬 사본: frame 을 TB3 기본(prefix 없음)으로,
# use_sim_time 을 true 로만 바꾼 것. 스캔매칭/루프클로저 튜닝은 동일.
#
# 시뮬에서는 frame_prefix 를 적용하지 않으므로 odom/base_footprint 기본 프레임 사용.
# 토픽은 네임스페이스(aip2)가 적용되어 /aip2/scan.
/aip2/slam_toolbox:
  ros__parameters:
    odom_frame:  odom
    base_frame:  base_footprint
    map_frame:   map
    scan_topic:  /aip2/scan

    mode: mapping
    use_sim_time: true            # 시뮬 — true
    transform_timeout: 0.5
    tf_buffer_duration: 30.0
    transform_publish_period: 0.02
    map_update_interval: 2.0

    resolution: 0.05
    # Gazebo TB3 LDS 시뮬 유효 범위(약 0.12~3.5m).
    minimum_laser_range: 0.12
    max_laser_range: 3.5
    minimum_travel_distance: 0.08
    minimum_travel_heading: 0.2

    do_loop_closing: true
    loop_search_space_dimension: 8.0
    loop_match_minimum_chain_size: 10
    loop_match_maximum_variance_coarse: 3.0
    loop_match_minimum_response_coarse: 0.50
    loop_match_minimum_response_fine:   0.60
    num_threads: 4

    distance_variance_penalty: 0.9
    angle_variance_penalty: 3.0
    fine_search_angle_offset: 0.00349
    coarse_search_angle_offset: 0.349
    coarse_angle_resolution: 0.0349
    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.5
    use_response_expansion: true

    map_start_pose: [0.0, 0.0, 0.0]
