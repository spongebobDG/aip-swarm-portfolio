# Nav2 — Gazebo Classic TB3 Burger 시뮬 (aip2).
# 실차 nav2.yaml 의 시뮬 사본: frame 을 TB3 기본(odom/base_footprint, prefix 없음)으로,
# use_sim_time 을 true 로만 변경. 컨트롤러(MPPI)·플래너·costmap 튜닝은 실차와 동일.
#
# navigation_launch.py 가 namespace=aip2 로 RewriteYaml(root_key='aip2') 적용 →
# 노드 키는 bare. frame 값은 rewrite 대상이 아니므로 명시.

bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /aip2/odom
    bt_loop_duration: 10
    default_server_timeout: 20
    bond_timeout: 0.0   # lifecycle bond 비활성 — DDS 재연결 시 false positive 방지

controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 10.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugins: ['progress_checker']
    goal_checker_plugins: ['goal_checker']
    controller_plugins: ['FollowPath']

    progress_checker:
      plugin: 'nav2_controller::SimpleProgressChecker'
      required_movement_radius: 0.10
      movement_time_allowance: 15.0

    goal_checker:
      plugin: 'nav2_controller::SimpleGoalChecker'
      xy_goal_tolerance: 0.20
      yaw_goal_tolerance: 0.25
      stateful: True

    FollowPath:
      plugin: 'nav2_rotation_shim_controller::RotationShimController'
      angular_dist_threshold: 0.785
      forward_sampling_distance: 0.5
      rotate_to_heading_angular_vel: 0.8
      max_angular_accel: 1.5
      simulate_ahead_time: 1.0
      primary_controller: 'nav2_mppi_controller::MPPIController'

      time_steps: 28
      model_dt: 0.10
      batch_size: 1000
      iteration_count: 1
      temperature: 0.3
      gamma: 0.015
      motion_model: 'DiffDrive'
      vx_max: 0.20
      vx_min: -0.10
      vy_max: 0.0
      wz_max: 2.5
      vx_std: 0.10
      vy_std: 0.0
      wz_std: 0.40
      prune_distance: 0.5
      transform_tolerance: 0.5
      visualize: false
      critics:
        - ConstraintCritic
        - CostCritic
        - GoalCritic
        - GoalAngleCritic
        - PathAlignCritic
        - PathFollowCritic
        - PreferForwardCritic
      ConstraintCritic: {enabled: true, cost_power: 1, cost_weight: 4.0}
      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
        critical_cost: 253.0
        consider_footprint: false
        collision_cost: 1000000.0
        near_goal_distance: 1.0
      GoalCritic: {enabled: true, cost_power: 1, cost_weight: 6.0, threshold_to_consider: 1.0}
      GoalAngleCritic: {enabled: true, cost_power: 1, cost_weight: 3.0, threshold_to_consider: 0.40}
      PreferForwardCritic: {enabled: true, cost_power: 1, cost_weight: 3.0, threshold_to_consider: 0.40}
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 10.0
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 3
        threshold_to_consider: 0.40
        offset_from_furthest: 20
        use_path_orientations: false
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        offset_from_furthest: 5
        threshold_to_consider: 1.4

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: odom
      robot_base_frame: base_footprint
      update_frequency: 5.0
      publish_frequency: 2.0
      transform_tolerance: 0.5
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      robot_radius: 0.105
      plugins: ['obstacle_layer', 'inflation_layer']
      obstacle_layer:
        plugin: 'nav2_costmap_2d::ObstacleLayer'
        enabled: True
        observation_sources: scan
        scan:
          topic: /aip2/scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: 'LaserScan'
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
          inf_is_valid: true
      inflation_layer:
        plugin: 'nav2_costmap_2d::InflationLayer'
        cost_scaling_factor: 3.0
        inflation_radius: 0.30
      always_send_full_costmap: True

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: map
      robot_base_frame: base_footprint
      update_frequency: 1.0
      publish_frequency: 1.0
      transform_tolerance: 0.5
      robot_radius: 0.105
      resolution: 0.05
      track_unknown_space: true
      plugins: ['static_layer', 'obstacle_layer', 'inflation_layer']
      static_layer:
        plugin: 'nav2_costmap_2d::StaticLayer'
        map_topic: /map
        map_subscribe_transient_local: True
        subscribe_to_updates: True
        enabled: True
      obstacle_layer:
        plugin: 'nav2_costmap_2d::ObstacleLayer'
        enabled: True
        observation_sources: scan
        scan:
          topic: /aip2/scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: 'LaserScan'
          raytrace_max_range: 3.5
          raytrace_min_range: 0.0
          obstacle_max_range: 3.0
          obstacle_min_range: 0.0
          inf_is_valid: true
      inflation_layer:
        plugin: 'nav2_costmap_2d::InflationLayer'
        cost_scaling_factor: 3.0
        inflation_radius: 0.30
      always_send_full_costmap: True

planner_server:
  ros__parameters:
    use_sim_time: true
    expected_planner_frequency: 1.0
    planner_plugins: ['GridBased']
    GridBased:
      plugin: 'nav2_navfn_planner/NavfnPlanner'
      tolerance: 0.5
      use_astar: false
      allow_unknown: true

smoother_server:
  ros__parameters:
    use_sim_time: true
    smoother_plugins: ['simple_smoother']
    simple_smoother:
      plugin: 'nav2_smoother::SimpleSmoother'
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True

behavior_server:
  ros__parameters:
    use_sim_time: true
    local_costmap_topic: local_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_costmap_topic: global_costmap/costmap_raw
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ['spin', 'backup', 'drive_on_heading', 'wait']
    spin: {plugin: 'nav2_behaviors/Spin'}
    backup: {plugin: 'nav2_behaviors/BackUp'}
    drive_on_heading: {plugin: 'nav2_behaviors/DriveOnHeading'}
    wait: {plugin: 'nav2_behaviors/Wait'}
    local_frame: odom
    global_frame: map
    robot_base_frame: base_footprint
    transform_tolerance: 0.5
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2

waypoint_follower:
  ros__parameters:
    use_sim_time: true
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: 'wait_at_waypoint'
    wait_at_waypoint:
      plugin: 'nav2_waypoint_follower::WaitAtWaypoint'
      enabled: True
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    use_sim_time: true
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: 'OPEN_LOOP'
    max_velocity: [0.20, 0.0, 2.5]
    min_velocity: [-0.10, 0.0, -2.5]
    max_accel: [2.5, 0.0, 3.2]
    max_decel: [-2.5, 0.0, -3.2]
    odom_topic: '/aip2/odom'
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0
