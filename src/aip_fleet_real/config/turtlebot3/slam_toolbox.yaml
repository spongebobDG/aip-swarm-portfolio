# slam_toolbox online async (mapping) — TurtleBot3 Burger + LDS-03.
# 노드는 namespace=aip2 로 기동되므로 FQN 키(/aip2/slam_toolbox)로 지정.
# (bare "slam_toolbox:" 는 root ns 노드만 매칭하므로 무효)
#
# aip_swarm_ws 시뮬 원본(src/aip_fleet_nav/params/slam_toolbox_online.yaml)을
# 실차/Burger 기준으로 조정. use_sim_time: false.
/aip2/slam_toolbox:
  ros__parameters:

    # ── Frames ──────────────────────────────────────────────────────────────
    odom_frame:  aip2/odom
    base_frame:  aip2/base_link
    map_frame:   map
    scan_topic:  /aip2/scan

    # ── Mode ────────────────────────────────────────────────────────────────
    mode: mapping
    use_sim_time: false          # 실차 — 반드시 false
    transform_timeout: 0.5
    tf_buffer_duration: 30.0
    transform_publish_period: 0.02
    map_update_interval: 5.0

    # ── Map update ──────────────────────────────────────────────────────────
    resolution: 0.05
    # LDS-03 유효 범위. 실측으로 보정 권장(데이터시트 0.16~8.0m 부근).
    minimum_laser_range: 0.12
    max_laser_range: 8.0
    throttle_scans: 3             # RPi4B 절감: LDS-03 5Hz → ~1.7Hz 처리
    minimum_travel_distance: 0.15  # 정지/저속 시 불필요한 스캔 처리 방지
    minimum_travel_heading: 0.35

    # ── Loop closure ────────────────────────────────────────────────────────
    do_loop_closing: true
    loop_search_space_dimension: 8.0
    loop_match_minimum_chain_size: 10
    loop_match_maximum_variance_coarse: 3.0
    loop_match_minimum_response_coarse: 0.50
    loop_match_minimum_response_fine:   0.60
    # RPi4B 4코어 — solver 스레드 제한으로 LiDAR/Nav2 CPU 기아 방지.
    num_threads: 2

    # ── Scan matcher ────────────────────────────────────────────────────────
    distance_variance_penalty: 0.9
    angle_variance_penalty: 3.0
    fine_search_angle_offset: 0.00349
    coarse_search_angle_offset: 0.349
    coarse_angle_resolution: 0.0349
    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.5
    use_response_expansion: true

    map_start_pose: [0.0, 0.0, 0.0]
