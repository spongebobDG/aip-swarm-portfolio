# Nav2 — 자작 차량(aip3) PLACEHOLDER.
# ⚠️ 차체 치수/운동학/LiDAR 미확정. 아래 값은 TB3 기반 임시값.
# 드라이버(STS3215) + LiDAR 확정 후 robot_radius, 속도, frame, scan range 갱신 필수.
#
# navigation_launch.py(namespace=aip3, use_namespace=true)가 RewriteYaml 로
# aip3 네임스페이스를 적용 → 노드 키는 bare 로 둔다.

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: aip3/base_link   # TODO 확정
    odom_topic: /aip3/odom
    bt_loop_duration: 10
    default_server_timeout: 20

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 5.0   # RPi4B 절감: 10→5Hz
    progress_checker_plugins: ['progress_checker']
    goal_checker_plugins: ['goal_checker']
    controller_plugins: ['FollowPath']
    progress_checker:
      plugin: 'nav2_controller::SimpleProgressChecker'
      required_movement_radius: 0.10
      movement_time_allowance: 15.0
    goal_checker:
      plugin: 'nav2_controller::SimpleGoalChecker'
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25
      stateful: True
    FollowPath:
      plugin: 'nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController'
      desired_linear_vel: 0.30
      lookahead_dist: 0.5
      min_lookahead_dist: 0.25
      max_lookahead_dist: 0.75
      lookahead_time: 1.5
      rotate_to_heading_angular_vel: 0.7
      transform_tolerance: 0.3
      use_velocity_scaled_lookahead_dist: true
      min_approach_linear_velocity: 0.05
      approach_velocity_scaling_dist: 0.5
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 1.0
      use_regulated_linear_velocity_scaling: true
      use_cost_regulated_linear_velocity_scaling: false
      regulated_linear_scaling_min_radius: 0.9
      regulated_linear_scaling_min_speed: 0.10
      use_rotate_to_heading: true
      rotate_to_heading_min_angle: 0.785
      max_angular_accel: 1.0
      allow_reversing: false

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: aip3/odom
      robot_base_frame: aip3/base_link
      update_frequency: 3.0   # RPi4B 절감: 5→3Hz
      publish_frequency: 2.0
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      robot_radius: 0.15     # TODO 확정
      plugins: ['obstacle_layer', 'inflation_layer']
      obstacle_layer:
        plugin: 'nav2_costmap_2d::ObstacleLayer'
        enabled: True
        observation_sources: scan keepout_cloud
        scan:
          topic: /aip3/scan
          data_type: 'LaserScan'
          marking: True
          clearing: True
          inf_is_valid: true
        # 대시보드 금지구역(위험구역) — /fleet/keepout_cloud(map) 마킹만(저부하). 해제 시 ClearEntireCostmap.
        keepout_cloud:
          topic: /fleet/keepout_cloud
          data_type: 'PointCloud2'
          max_obstacle_height: 2.0
          obstacle_max_range: 100.0
          clearing: False
          marking: True
      inflation_layer:
        plugin: 'nav2_costmap_2d::InflationLayer'
        cost_scaling_factor: 3.0
        inflation_radius: 0.35
      always_send_full_costmap: True

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: map
      robot_base_frame: aip3/base_link
      update_frequency: 0.5   # RPi4B 절감: 1→0.5Hz
      publish_frequency: 0.5
      resolution: 0.05
      robot_radius: 0.15     # TODO 확정
      track_unknown_space: true
      plugins: ['static_layer', 'obstacle_layer', 'inflation_layer']
      static_layer:
        plugin: 'nav2_costmap_2d::StaticLayer'
        map_subscribe_transient_local: True
      obstacle_layer:
        plugin: 'nav2_costmap_2d::ObstacleLayer'
        enabled: True
        observation_sources: scan keepout_cloud
        scan:
          topic: /aip3/scan
          data_type: 'LaserScan'
          marking: True
          clearing: True
          inf_is_valid: true
        # 대시보드 금지구역(위험구역) — /fleet/keepout_cloud(map) 마킹만(저부하). 해제 시 ClearEntireCostmap.
        keepout_cloud:
          topic: /fleet/keepout_cloud
          data_type: 'PointCloud2'
          max_obstacle_height: 2.0
          obstacle_max_range: 100.0
          clearing: False
          marking: True
      inflation_layer:
        plugin: 'nav2_costmap_2d::InflationLayer'
        cost_scaling_factor: 3.0
        inflation_radius: 0.35
      always_send_full_costmap: True

planner_server:
  ros__parameters:
    use_sim_time: false
    planner_plugins: ['GridBased']
    GridBased:
      plugin: 'nav2_navfn_planner/NavfnPlanner'
      tolerance: 0.5
      use_astar: false
      allow_unknown: true

behavior_server:
  ros__parameters:
    use_sim_time: false
    local_frame: aip3/odom
    global_frame: map
    robot_base_frame: aip3/base_link
    behavior_plugins: ['spin', 'backup', 'wait']
    spin: {plugin: 'nav2_behaviors/Spin'}
    backup: {plugin: 'nav2_behaviors/BackUp'}
    wait: {plugin: 'nav2_behaviors/Wait'}
